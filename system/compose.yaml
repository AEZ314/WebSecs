# The services defined here internally use service names to communicate with each other: ie. grafana:3000
# Docker resolves service names to IPs only when they are in the same *user defined* bridge network.
# So, make sure they are all in the system-proxy network or some other *user defined* network.
services:
  debug:
    # A container with utilities installed for testing container connections etc.
    image: nicolaka/netshoot
    stdin_open: true
    tty: true
         
  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped

    # extra_hosts get added to /etc/hosts file, which NPM apparently doesn't read at all... So, if you need to forward to the host machine, use literal gateway IP in NPM (ie, 10.0.2.1)
    # extra_hosts:
    #  - "host.docker.internal:host-gateway" # resolves in curl but not NPM 
          
    ports:
      - '80:80' # Public HTTP Port
      - '443:443' # Public HTTPS Port
      - '81:81' # Admin Web Port

    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 10s
      timeout: 3s

    environment:
      TZ: ${TZ:-Europe/Istanbul}
      # Supposed to solve host.docker.internal problem but PR that enables this flag is not merged yet...
      # NPM_PRE_RESOLVE_UPSTREAM_HOSTS: "true"
      # DISABLE_IPV6: 'true'
      # SQLite DB file within the container
      # DB_SQLITE_FILE: "/data/database.sqlite"

    volumes:
      # custom NGINX settings
      - ./config/npm/custom:/data/nginx/custom
      # custom log rotation settings
      - ./config/npm/logrotate.custom:/etc/logrotate.d/nginx-proxy-manager
      - logs_npm:/data/logs
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt


  wireguard:
    image: ghcr.io/wgdashboard/wgdashboard:latest
    restart: unless-stopped

    ports:
    # access GUI via wireguard:10086. Need to expose 51820 since NPM can't proxy udp.
      - '51820:51820/udp'
  
    volumes:
      - aconf:/etc/amnezia/amneziawg
      - conf:/etc/wireguard
      - data:/data

    # permit network administration to container
    cap_add:
      - NET_ADMIN

    # need these for routing to work
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv6.conf.all.forwarding: "1"

networks:
  default:
    name: system-proxy
    # set true outside of the "system" stack to prevent duplication
    external: false

volumes:
  logs_npm:
    # set true outside of the "system" stack to prevent duplication
    external: false
  aconf:
  conf:
  data:
          